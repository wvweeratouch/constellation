<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Constellation Mirror</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #050510; overflow: hidden; height: 100vh; cursor: none; }
canvas { width: 100vw; height: 100vh; display: block; }
#status {
  position: fixed; top: 12px; right: 16px; z-index: 10;
  font: 12px 'Segoe UI', system-ui, sans-serif; color: #666;
  transition: opacity 0.5s;
}
#clickPrompt {
  position: fixed; inset: 0; z-index: 20; display: flex;
  align-items: center; justify-content: center; cursor: pointer;
  background: #050510;
}
#clickPrompt span { color: #d4af37; font: 1.4rem 'Segoe UI', system-ui, sans-serif; letter-spacing: 0.1em; }
</style>
</head>
<body>
<div id="clickPrompt"><span>click for fullscreen mirror</span></div>
<div id="status">waiting for signal...</div>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const status = document.getElementById('status');
const bc = new BroadcastChannel('constellation');

let lastMessage = 0;
let currentState = null;
let fadeToBlack = false;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  // Fill black on resize
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', resize);

function hexToRgb(hex) {
  return {
    r: parseInt(hex.slice(1, 3), 16),
    g: parseInt(hex.slice(3, 5), 16),
    b: parseInt(hex.slice(5, 7), 16),
  };
}

bc.onmessage = (e) => {
  if (e.data.type === 'state') {
    currentState = e.data;
    lastMessage = performance.now();
    fadeToBlack = false;
    status.textContent = 'receiving';
    status.style.opacity = '0.4';
  }
};

function draw(timestamp) {
  requestAnimationFrame(draw);

  const now = performance.now();
  const timeSinceMsg = now - lastMessage;

  // Fade to black if no messages for 2 seconds
  if (lastMessage > 0 && timeSinceMsg > 2000) {
    if (!fadeToBlack) {
      fadeToBlack = true;
      status.textContent = 'signal lost';
      status.style.opacity = '1';
    }
    ctx.fillStyle = 'rgba(5,5,16,0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    return;
  }

  if (!currentState) return;

  const { constellations, settings } = currentState;
  const w = canvas.width;
  const h = canvas.height;

  // Trail fade
  ctx.fillStyle = `rgba(5,5,16,${settings.trail})`;
  ctx.fillRect(0, 0, w, h);

  const { r, g, b } = hexToRgb(settings.color);
  const holdMs = settings.hold * 1000;
  const fadeMs = settings.fade * 1000;

  for (const c of constellations) {
    const age = now - c.birthTime;
    const totalLife = holdMs + fadeMs;

    // For mirror, we approximate age from broadcast time offset
    // Since birthTime is in sender's performance.now() space, use relative
    const senderNow = currentState.timestamp;
    const relativeAge = senderNow - c.birthTime;

    let alpha = 1;
    if (relativeAge > holdMs) {
      alpha = Math.max(0, 1 - (relativeAge - holdMs) / fadeMs);
    }
    if (alpha <= 0) continue;

    // Draw lines
    ctx.lineWidth = 0.8;
    for (const conn of c.connections) {
      const pa = c.points[conn.a];
      const pb = c.points[conn.b];
      ctx.strokeStyle = `rgba(${r},${g},${b},${alpha * 0.4})`;
      ctx.beginPath();
      ctx.moveTo(pa.x * w, pa.y * h);
      ctx.lineTo(pb.x * w, pb.y * h);
      ctx.stroke();
    }

    // Draw dots
    for (const p of c.points) {
      ctx.fillStyle = `rgba(${r},${g},${b},${alpha * 0.8})`;
      ctx.beginPath();
      ctx.arc(p.x * w, p.y * h, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

document.getElementById('clickPrompt').addEventListener('click', () => {
  document.getElementById('clickPrompt').style.display = 'none';
  document.documentElement.requestFullscreen().catch(() => {});
  resize();
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  requestAnimationFrame(draw);
});

resize();
</script>
</body>
</html>
